<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nişan Davetiyesi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
}

/* Bulanık arka plan */
.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
    overflow:hidden;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(35px) brightness(0.75);
    transform:scale(1.2);
}

/* Ana video */
.main-video{
    position:fixed;
    inset:0;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main-video video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

/* Konum butonu */
.location-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    z-index:10;
}

.location-btn a{
    display:inline-block;
    text-decoration:none;
    background:rgba(93,115,78,0.95);
    color:white;
    padding:14px 24px;
    border-radius:40px;
    font-family:Arial, sans-serif;
    font-size:15px;
    font-weight:bold;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

/* Mobil */
@media(max-width:768px){
    .location-btn{
        bottom:18px;
        right:18px;
    }

    .location-btn a{
        font-size:14px;
        padding:12px 20px;
    }
}
</style>

</head>

<body>

<!-- Arka plandaki bulanık video -->

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<!-- Ana davetiye videosu -->

<div class="main-video">
    <video autoplay muted loop playsinline controls>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<!-- Konum butonu -->

<div class="location-btn">
    <a href="https://maps.google.com/?q=Fly+Garden" target="_blank">
        📍 Konuma Git
    </a>
</div>

</body>
</html>
