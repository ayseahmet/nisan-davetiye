<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nişan Davetiyesi</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
    font-family:Arial, sans-serif;
}

.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
    overflow:hidden;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(38px) brightness(.78);
    transform:scale(1.25);
}

.main-video{
    position:fixed;
    inset:0;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
}

.video-wrap{
    position:relative;
    height:100vh;
}

.video-wrap video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

/* GERİ SAYIM */
.countdown{
    position:absolute;
    left:50%;
    bottom:145px;
    transform:translateX(-50%);
    z-index:60;

    width:70%;
    padding:10px 8px;

    background:rgba(255,255,255,.28);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.25);
    border-radius:4px;

    text-align:center;
    color:#1f1f1f;
}

.count-title{
    font-size:11px;
    letter-spacing:2px;
    margin-bottom:5px;
}

#timer{
    font-size:14px;
    font-weight:bold;
}

/* ALT BİLGİ KARTI */
.info-card{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:50;

    width:70%;
    height:120px;

    display:grid;
    grid-template-columns:1fr 1px 1fr 1px 1fr;
    align-items:center;

    background:rgba(255,255,255,.28);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.25);
    border-radius:4px;
}

.info-item{
    text-align:center;
    color:#1f1f1f;
}

.info-item svg{
    width:28px;
    height:28px;
    stroke-width:1.5;
    margin-bottom:8px;
}

.title{
    font-size:15px;
    letter-spacing:2px;
    margin-bottom:5px;
}

.value{
    font-size:16px;
    line-height:1.35;
}

.divider{
    width:1px;
    height:90px;
    background:rgba(0,0,0,.45);
}

.location-link{
    text-decoration:none;
    color:inherit;
}

@media(max-width:768px){
    .video-wrap{
        width:100vw;
        height:auto;
    }

    .video-wrap video{
        width:100vw;
        height:auto;
        max-height:100vh;
    }

    .countdown{
        width:72%;
        bottom:124px;
        padding:7px 5px;
    }

    .count-title{
        font-size:8px;
    }

    #timer{
        font-size:10px;
    }

    .info-card{
        width:72%;
        height:100px;
        bottom:18px;
    }

    .info-item svg{
        width:22px;
        height:22px;
        margin-bottom:5px;
    }

    .title{
        font-size:10px;
        letter-spacing:2px;
    }

    .value{
        font-size:11px;
    }

    .divider{
        height:78px;
    }
}
</style>
</head>

<body>

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<div class="main-video">
    <div class="video-wrap">

        <video autoplay muted loop playsinline>
            <source src="nisan.mp4" type="video/mp4">
        </video>

        <div class="countdown">
            <div class="count-title">NİŞANIMIZA KALAN SÜRE</div>
            <div id="timer">Yükleniyor...</div>
        </div>

        <div class="info-card">

            <div class="info-item">
                <i data-lucide="calendar-days"></i>
                <div class="title">TARİH</div>
                <div class="value">3 Temmuz 2026</div>
                <div class="value">Cuma</div>
            </div>

            <div class="divider"></div>

            <div class="info-item">
                <i data-lucide="clock-3"></i>
                <div class="title">SAAT</div>
                <div class="value">19:30</div>
            </div>

            <div class="divider"></div>

            <a class="location-link" href="https://maps.google.com/?q=Fly+Garden" target="_blank">
                <div class="info-item">
                    <i data-lucide="map-pin"></i>
                    <div class="title">MEKAN</div>
                    <div class="value">Fly Garden</div>
                    <div class="value">Yeşilköy</div>
                </div>
            </a>

        </div>

    </div>
</div>

<script>
lucide.createIcons();

const targetDate = new Date("2026-07-03T19:30:00").getTime();

function updateCountdown(){
    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance < 0){
        document.getElementById("timer").innerHTML = "Bugün bizim günümüz";
        return;
    }

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("timer").innerHTML =
        days + " Gün • " +
        hours + " Saat • " +
        minutes + " Dk • " +
        seconds + " Sn";
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
