<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nişan Davetiyesi</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
    font-family:Arial, sans-serif;
}

.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
    overflow:hidden;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(38px) brightness(.78);
    transform:scale(1.25);
}

.main-video{
    position:fixed;
    inset:0;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
}

.video-wrap{
    position:relative;
    height:100vh;
}

.video-wrap video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

.info-panel{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:60;

    width:70%;

    background:rgba(255,255,255,.28);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.25);
    border-radius:4px;

    overflow:hidden;
}

.countdown{
    text-align:center;
    color:#1f1f1f;
    padding:10px 8px 8px;
    border-bottom:1px solid rgba(0,0,0,.18);
}

.count-title{
    font-size:11px;
    letter-spacing:2px;
    margin-bottom:5px;
}

#timer{
    font-size:14px;
    font-weight:bold;
}

.info-card{
    height:120px;
    display:grid;
    grid-template-columns:1fr 1px 1fr 1px 1fr;
    align-items:center;
}

.info-item{
    text-align:center;
    color:#1f1f1f;
}

.info-item svg{
    width:28px;
    height:28px;
    stroke-width:1.5;
    margin-bottom:8px;
}

.title{
    font-size:15px;
    letter-spacing:2px;
    margin-bottom:5px;
}

.value{
    font-size:16px;
    line-height:1.35;
}

.divider{
    width:1px;
    height:90px;
    background:rgba(0,0,0,.45);
}

.location-link{
    text-decoration:none;
    color:inherit;
}

@media(max-width:768px){
    .video-wrap{
        width:100vw;
        height:auto;
    }

    .video-wrap video{
        width:100vw;
        height:auto;
        max-height:100vh;
    }

    .info-panel{
        width:72%;
        bottom:18px;
    }

    .countdown{
        padding:7px 5px 6px;
    }

    .count-title{
        font-size:8px;
    }

    #timer{
        font-size:10px;
    }

    .info-card{
        height:100px;
    }

    .info-item svg{
        width:22px;
        height:22px;
        margin-bottom:5px;
    }

    .title{
        font-size:10px;
        letter-spacing:2px;
    }

    .value{
        font-size:11px;
    }

    .divider{
        height:78px;
    }
}
</style>
</head>

<body>

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="./nisannn.mp4?v=4000" type="video/mp4">
    </video>
</div>

<div class="main-video">
    <div class="video-wrap">

        <video autoplay muted loop playsinline>
            <source src="./nisannn.mp4?v=4000" type="video/mp4">
        </video>

        <div class="info-panel">

            <div class="countdown">
                <div class="count-title">NİŞANIMIZA KALAN SÜRE</div>
                <div id="timer">Yükleniyor...</div>
            </div>

            <div class="info-card">

                <div class="info-item">
                    <i data-lucide="calendar-days"></i>
                    <div class="title">TARİH</div>
                    <div class="value">3 Temmuz 2026</div>
                    <div class="value">Cuma</div>
                </div>

                <div class="divider"></div>

                <div class="info-item">
                    <i data-lucide="clock-3"></i>
                    <div class="title">SAAT</div>
                    <div class="value">19:00</div>
                </div>

                <div class="divider"></div>

                <a class="location-link"
                   href="https://www.google.com/maps/place/Fly+Garden+Event+-+Ye%C5%9Filk%C3%B6y+K%C4%B1r+D%C3%BC%C4%9F%C3%BCn%C3%BC+%26+Florya+A%C3%A7%C4%B1k+Hava+D%C3%BC%C4%9F%C3%BCn+Salonu+%26+Bak%C4%B1rk%C3%B6y+A%C3%A7%C4%B1k+Hava+Ni%C5%9Fan+Mekanlar%C4%B1/@41.0229882,28.880494,12.75z/data=!4m6!3m5!1s0x14caa591c09dada3:0x13baed8cee10f099!8m2!3d40.9845215!4d28.834748!16s%2Fg%2F11l6qffdq5?entry=ttu&g_ep=EgoyMDI2MDYxMC4wIKXMDSoASAFQAw%3D%3D"
                   target="_blank"
                   rel="noopener noreferrer">
                    <div class="info-item">
                        <i data-lucide="map-pin"></i>
                        <div class="title">MEKAN</div>
                        <div class="value">Fly Garden</div>
                        <div class="value">Yeşilköy</div>
                    </div>
                </a>

            </div>

        </div>

    </div>
</div>

<script>
if (window.lucide) {
    lucide.createIcons();
}

const targetDate = new Date("2026-07-03T19:00:00").getTime();

function updateCountdown(){
    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance < 0){
        document.getElementById("timer").innerHTML = "Bugün bizim günümüz";
        return;
    }

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("timer").innerHTML =
        days + " Gün • " +
        hours + " Saat • " +
        minutes + " Dk • " +
        seconds + " Sn";
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
