<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nişan Davetiyesi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
    font-family:Arial, sans-serif;
}

.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
    overflow:hidden;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(38px) brightness(.78);
    transform:scale(1.25);
}

.main-video{
    position:fixed;
    inset:0;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
}

.video-wrap{
    position:relative;
    height:100vh;
    width:auto;
}

.video-wrap video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

.info-card{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:20;

    width:68%;
    min-height:115px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.62);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);

    padding:14px 10px;
}

.info-item{
    flex:1;
    text-align:center;
    color:#1f1f1f;
}

.icon{
    font-size:30px;
    margin-bottom:6px;
}

.title{
    font-size:15px;
    letter-spacing:2px;
    margin-bottom:6px;
}

.value{
    font-size:17px;
    line-height:1.35;
}

.divider{
    width:1px;
    height:95px;
    background:rgba(0,0,0,.55);
}

.location-link{
    flex:1;
    text-decoration:none;
    color:inherit;
}

@media(max-width:768px){
    .video-wrap{
        width:100vw;
        height:auto;
    }

    .video-wrap video{
        width:100vw;
        height:auto;
        max-height:100vh;
    }

    .info-card{
        width:68%;
        bottom:18px;
        min-height:95px;
        padding:10px 6px;
    }

    .icon{font-size:24px;}
    .title{font-size:11px;}
    .value{font-size:12px;}
    .divider{height:78px;}
}
</style>
</head>

<body>

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<div class="main-video">
    <div class="video-wrap">

        <video autoplay muted loop playsinline>
            <source src="nisan.mp4" type="video/mp4">
        </video>

        <div class="info-card">

            <div class="info-item">
                <div class="icon">▦</div>
                <div class="title">TARİH</div>
                <div class="value">3 Temmuz 2026</div>
                <div class="value">Cuma</div>
            </div>

            <div class="divider"></div>

            <div class="info-item">
                <div class="icon">◷</div>
                <div class="title">SAAT</div>
                <div class="value">19:30</div>
            </div>

            <div class="divider"></div>

            <a class="location-link" href="https://maps.google.com/?q=Fly+Garden" target="_blank">
                <div class="info-item">
                    <div class="icon">⌖</div>
                    <div class="title">MEKAN</div>
                    <div class="value">Fly Garden</div>
                    <div class="value">Yeşilköy</div>
                </div>
            </a>

        </div>

    </div>
</div>

</body>
</html>
