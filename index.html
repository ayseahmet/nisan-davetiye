<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nişan Davetiyesi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
    font-family:Arial, sans-serif;
}

.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
    overflow:hidden;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(38px) brightness(.72);
    transform:scale(1.25);
}

.main-video{
    position:fixed;
    inset:0;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main-video video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

.info-card{
    position:fixed;
    left:50%;
    bottom:22px;
    transform:translateX(-50%);
    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:center;

    width:min(92%, 560px);

    background:rgba(255,255,255,.24);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.45);
    border-radius:18px;

    padding:14px 16px;

    box-shadow:0 8px 28px rgba(0,0,0,.18);
}

.info-item{
    flex:1;
    text-align:center;
    color:#222;
}

.icon{
    font-size:22px;
    margin-bottom:5px;
}

.title{
    font-size:11px;
    letter-spacing:2px;
    color:#344b3b;
    margin-bottom:5px;
}

.value{
    font-size:14px;
    line-height:1.35;
    color:#222;
}

.divider{
    width:1px;
    height:62px;
    background:rgba(0,0,0,.25);
}

.location-link{
    flex:1;
    text-decoration:none;
    color:inherit;
}

@media(max-width:768px){

    .info-card{
        bottom:14px;
        width:94%;
        padding:12px 10px;
        border-radius:16px;
    }

    .icon{
        font-size:19px;
    }

    .title{
        font-size:9px;
        letter-spacing:1.5px;
    }

    .value{
        font-size:11px;
    }

    .divider{
        height:55px;
    }
}
</style>
</head>

<body>

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<div class="main-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<div class="info-card">

    <div class="info-item">
        <div class="icon">📅</div>
        <div class="title">TARİH</div>
        <div class="value">3 Temmuz 2026</div>
        <div class="value">Cuma</div>
    </div>

    <div class="divider"></div>

    <div class="info-item">
        <div class="icon">🕒</div>
        <div class="title">SAAT</div>
        <div class="value">19:30</div>
    </div>

    <div class="divider"></div>

    <a class="location-link" href="https://maps.google.com/?q=Fly+Garden" target="_blank">
        <div class="info-item">
            <div class="icon">📍</div>
            <div class="title">MEKAN</div>
            <div class="value">Fly Garden</div>
            <div class="value">Yeşilköy</div>
        </div>
    </a>

</div>

</body>
</html>
