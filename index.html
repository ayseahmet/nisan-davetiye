<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nişan Davetiyesi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
}

/* Bulanık arka plan */
.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
    overflow:hidden;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(35px) brightness(.75);
    transform:scale(1.2);
}

/* Ana video alanı */
.main-video{
    position:fixed;
    inset:0;
    z-index:2;

    display:flex;
    justify-content:center;
    align-items:center;
}

.main-video video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

/* Konum butonu */
.location-btn{
    position:absolute;
    bottom:35px;
    right:35px;
    z-index:10;
}

.location-btn a{
    text-decoration:none;
    background:rgba(93,115,78,.92);
    color:white;

    padding:12px 22px;

    border-radius:40px;

    font-family:Arial,sans-serif;
    font-size:14px;
    font-weight:600;

    backdrop-filter:blur(10px);

    box-shadow:0 6px 20px rgba(0,0,0,.25);
}

/* Mobil */
@media(max-width:768px){

    .main-video video{
        width:100%;
        height:auto;
        max-height:100vh;
    }

    .location-btn{
        bottom:20px;
        right:20px;
    }

    .location-btn a{
        font-size:13px;
        padding:10px 18px;
    }
}

</style>

</head>

<body>

<!-- Bulanık arka plan -->

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<!-- Ana video -->

<div class="main-video">

```
<video autoplay muted loop playsinline>
    <source src="nisan.mp4" type="video/mp4">
</video>

<div class="location-btn">
    <a href="https://maps.google.com/?q=Fly+Garden" target="_blank">
        📍 Fly Garden
    </a>
</div>
```

</div>

</body>
</html>
