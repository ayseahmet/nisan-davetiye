<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ayşe & Ahmet Nişan Davetiyesi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2eb;
    font-family:'Segoe UI',sans-serif;
}

/* Bulanık arka plan */
.bg-video{
    position:fixed;
    inset:0;
    z-index:1;
}

.bg-video video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(40px) brightness(.70);
    transform:scale(1.25);
}

/* Ana video */
.main-video{
    position:fixed;
    inset:0;
    z-index:2;

    display:flex;
    justify-content:center;
    align-items:center;
}

.main-video video{
    height:100vh;
    width:auto;
    max-width:100vw;
    object-fit:contain;
}

/* Bilgi kartı */
.info-card{
    position:fixed;
    left:50%;
    bottom:25px;
    transform:translateX(-50%);

    z-index:100;

    display:flex;
    align-items:center;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.35);

    border-radius:22px;

    padding:18px 28px;

    box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.info-item{
    min-width:140px;
    text-align:center;
}

.icon{
    font-size:26px;
    margin-bottom:8px;
}

.title{
    font-size:12px;
    letter-spacing:2px;
    color:#546454;
    margin-bottom:8px;
}

.value{
    font-size:16px;
    color:#2f2f2f;
    line-height:1.5;
}

.divider{
    width:1px;
    height:90px;
    background:rgba(0,0,0,.15);
    margin:0 18px;
}

.location-link{
    text-decoration:none;
    color:inherit;
}

/* Mobil */
@media(max-width:768px){

.info-card{
    width:94%;
    padding:14px;
}

.info-item{
    min-width:auto;
    flex:1;
}

.divider{
    margin:0 10px;
    height:70px;
}

.icon{
    font-size:20px;
}

.title{
    font-size:10px;
}

.value{
    font-size:12px;
}

}

</style>

</head>

<body>

<!-- Bulanık arka plan -->

<div class="bg-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<!-- Ana video -->

<div class="main-video">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<!-- Alt Bilgi Kartı -->

<div class="info-card">

```
<div class="info-item">
    <div class="icon">📅</div>
    <div class="title">TARİH</div>
    <div class="value">3 Temmuz 2026</div>
    <div class="value">Cuma</div>
</div>

<div class="divider"></div>

<div class="info-item">
    <div class="icon">🕒</div>
    <div class="title">SAAT</div>
    <div class="value">19:30</div>
</div>

<div class="divider"></div>

<a class="location-link"
   href="https://maps.google.com/?q=Fly+Garden"
   target="_blank">

    <div class="info-item">
        <div class="icon">📍</div>
        <div class="title">MEKAN</div>
        <div class="value">Fly Garden</div>
        <div class="value">Yeşilköy</div>
    </div>

</a>
```

</div>

</body>
</html>
