<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nişan Davetiyesi</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #eee9df;
    overflow: hidden;
}

.bg {
    position: fixed;
    inset: 0;
    z-index: 1;
}

.bg video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(35px) brightness(0.75);
    transform: scale(1.2);
}

.main {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
}

.main video {
    height: 100vh;
    width: auto;
    max-width: 100vw;
    object-fit: contain;
}
</style>
</head>

<body>

<div class="bg">
    <video autoplay muted loop playsinline>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

<div class="main">
    <video autoplay muted loop playsinline controls>
        <source src="nisan.mp4" type="video/mp4">
    </video>
</div>

</body>
</html>
